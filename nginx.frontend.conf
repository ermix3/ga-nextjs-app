events {
    worker_connections 1024;
}

http {
    upstream frontend {
        server frontend:3000;
    }

    upstream backend {
        server backend:8000;
    }

    upstream phpmyadmin {
        server phpmyadmin:80;
    }

    server {
        listen 80;
        server_name 136.244.91.127;
############################################# When active ssl remove this section #############################################
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
############################################# When active ssl remove this section #############################################

############################################# Https section #############################################
#         # Redirect all HTTP requests to HTTPS
#         return 301 https://$host$request_uri;
#     }
#
#     server {
#         listen 443 ssl;
#         server_name 136.244.91.127;
#
#         ssl_certificate /etc/nginx/ssl/fullchain.pem;
#         ssl_certificate_key /etc/nginx/ssl/privkey.pem;
#         ssl_protocols TLSv1.2 TLSv1.3;
#         ssl_ciphers HIGH:!aNULL:!MD5;

#         location / {
#             proxy_pass http://frontend;
#             proxy_set_header Host $host;
#             proxy_set_header X-Real-IP $remote_addr;
#             proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#             proxy_set_header X-Forwarded-Proto $scheme;
#         }
############################################# Https section #############################################
        location /api {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        location /storage/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /phpmyadmin {
            proxy_pass http://phpmyadmin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Rewrite and handles both with and without trailing slashes
            rewrite ^(/phpmyadmin)/(.*)$ /$2 break;

            # Required fastcgi parameters
            proxy_redirect off;
            proxy_buffering off;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # IP restriction — adjust your IP here
            # allow 136.244.91.127;
            # deny all;
        }
    }
}
