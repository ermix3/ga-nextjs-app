events {
    worker_connections 1024;
}

http {
    upstream frontend {
        server frontend:3000;
    }

    upstream backend {
        server backend:8000;
    }

    upstream phpmyadmin {
        server phpmyadmin:80;
    }

    # Redirect IP access to domain name (HTTP)
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        return 301 https://abdeel.me$request_uri;
    }

    # Redirect IP access to domain name (HTTPS)
    server {
        listen 443 ssl default_server;
        server_name _;

        # Use your existing SSL certificates
        ssl_certificate /etc/letsencrypt/live/abdeel.me/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/abdeel.me/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        return 301 https://abdeel.me$request_uri;
    }

    # HTTP to HTTPS redirect for your domain
    server {
        listen 80;
        server_name abdeel.me www.abdeel.me;
        return 301 https://$host$request_uri;
    }

    # Main HTTPS server for your domain
    server {
        listen 443 ssl;
        server_name abdeel.me www.abdeel.me;

        ssl_certificate /etc/letsencrypt/live/abdeel.me/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/abdeel.me/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # HSTS
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Reverse proxy frontend
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API reverse proxy
        location /api {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;

            # File upload settings
            client_max_body_size 20M;
            proxy_request_buffering off;

            # Increased timeouts for larger requests
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;

            # Buffer settings
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;

            # CORS headers for file uploads
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE';
            add_header 'Access-Control-Allow-Headers' 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization';

            # Handle preflight requests
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                add_header 'Content-Length' 0;
                return 204;
            }
        }

        # For static file access via backend
        location /storage/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # phpMyAdmin access
        location /phpmyadmin/ {
            proxy_pass http://phpmyadmin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Add these lines to fix the redirect issue
            proxy_redirect / /phpmyadmin/;
            proxy_set_header X-Script-Name /phpmyadmin;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Keep existing parameters
            proxy_buffering off;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # IP restriction — adjust your IP here
            # allow 136.244.91.127;
            # deny all;
        }

        # redirect /phpmyadmin without trailing slash to add it
        location = /phpmyadmin {
            return 301 /phpmyadmin/;
        }
    }
}
